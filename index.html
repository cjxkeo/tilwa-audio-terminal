<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tilwa - terminal audio</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            height: 100vh;
            box-sizing: border-box;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            transition: background-color 0.2s, border 0.2s;
        }

        body.dragover {
            background-color: #111111;
            border: 2px dashed #555555;
        }

        #output {
            margin-bottom: 10px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .input-line {
            display: flex;
            align-items: center;
        }

        .prompt {
            margin-right: 10px;
        }

        #cmd-input {
            background: transparent;
            border: none;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1em;
            flex-grow: 1;
            outline: none;
        }

        #file-input {
            display: none;
        }
    </style>
</head>
<body>
    <div id="output"></div>
    <div class="input-line">
        <span class="prompt">user@tilwa:~$</span>
        <input type="text" id="cmd-input" autofocus autocomplete="off" spellcheck="false">
    </div>
    
    <input type="file" id="file-input" accept="audio/*">
    
    <script>
        const outputDiv = document.getElementById('output');
        const cmdInput = document.getElementById('cmd-input');
        const fileInput = document.getElementById('file-input');
        
        let currentAudio = null;

        // dont touch this either
        function printLine(text) {
            const div = document.createElement('div');
            div.textContent = text;
            outputDiv.appendChild(div);
            window.scrollTo(0, document.body.scrollHeight);
        }

        printLine("tilwa: Enter a command to start");

        // this lets the user type todo: do not touch this
        // i thought i was smart by copying code but i endeed up messing more stuff
        cmdInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const rawInput = this.value.trim();
                printLine(`\nuser@tilwa:~$ ${rawInput}`);
                this.value = '';
                processCommand(rawInput);
            }
        });

        // command logic
        function processCommand(rawInput) {
            if (rawInput === '') return;
            
            const args = rawInput.split(' ').filter(Boolean);
            const cmd = args[0].toLowerCase();
            const param = args[1];
            
            switch(cmd) {
                case 'help':
                    printLine("Available commands: help, info, formats, upload, listen [code], stop");
                    break;
                case 'info':
                    printLine("heavy beta, this is technically early access, if there are any issues just tell me todo: make this pretty later");
                    break;
                case 'formats':
                    printLine("Supported file formats: MP3, WAV, FLAC, AAC, M4A, OGG, OPUS, WMA, AIFF, ALAC, AMR, AU, RA, RM, APE, MPC, TTA, WV, DSD, DSF, DFF, AC3, DTS, VOC, CAF, PCM, AIFC, SND");
                    break;
                case 'upload':
                    printLine("Drag and drop an audio file into this window");
                    fileInput.click();
                    break;
                case 'listen':
                    if (!param) {
                        printLine("Error: Please provide a track code. Usage: listen [code]");
                        return;
                    }
                    
                    printLine(`Querying database cluster for node [${param}]...`);
                    
                    fetch(`/functions/listen?code=${param}`)
                        .then(response => {
                            if (!response.ok) throw new Error("Track not found or database error :-(.");
                            return response.json();
                        })
                        .then(track => {
                            if (currentAudio) {
                                currentAudio.pause();
                                currentAudio.currentTime = 0;
                            }
                            
                            currentAudio = new Audio(track.data);
                            currentAudio.play();
                            printLine(`Streaming asset [${track.name}] successfully.`);
                        })
                        .catch(err => {
                            printLine(`Error: ${err.message}`);
                        });
                    break;
                case 'stop':
                    if (currentAudio && !currentAudio.paused) {
                        currentAudio.pause();
                        currentAudio.currentTime = 0;
                        printLine("File playback stopped.");
                    } else {
                        printLine("No file/sound is currently playing.");
                    }
                    break;
                default:
                    printLine(`Error: Command not found: ${cmd}. Type 'help' for a list of commands.`);
            }
        }
// file handler and whatnot do not touch this either
        function handleFile(file) {
            if (file) {
                if (file.size > 18 * 1024 * 1024) {
                    printLine("Error: File size exceeds the 18MB database buffer allocation limit.");
                    return;
                }

                printLine("Encoding file binary stream to terminal text standard...");
                
                const reader = new FileReader();
                reader.readAsDataURL(file); 
                
                reader.onload = function () {
                    printLine("Establishing uplink connection to database string arrays...");
                    
                    const payload = {
                        fileName: file.name,
                        fileType: file.type,
                        fileData: reader.result
                    };

                    fetch('/functions/upload', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    })
                    .then(res => {
                        if (!res.ok) throw new Error("Uplink rejected by database :-(.");
                        return res.json();
                    })
                    .then(data => {
                        printLine(`Uploading [====================] 100%`);
                        printLine(`Success! File globally indexed.`);
                        printLine(`File Name: ${data.name}`);
                        printLine(`File Code: ${data.code}`);
                        printLine(`\nShare this code to others! Anyone can play it using: listen ${data.code}`);
                    })
                    .catch(err => {
                        printLine(`Upload failed: ${err.message}`);
                    });
                };

                reader.onerror = function (error) {
                    printLine(`Error reading file: ${error}`);
                };
            }
        }

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                printLine(`\nuser@tilwa:~$ upload ${e.target.files[0].name}`);
                handleFile(e.target.files[0]);
            }
        });

        // drag and drop dont touch this either
        document.body.addEventListener('dragover', (e) => {
            e.preventDefault();
            document.body.classList.add('dragover');
        });

        document.body.addEventListener('dragleave', () => {
            document.body.classList.remove('dragover');
        });

        document.body.addEventListener('drop', (e) => {
            e.preventDefault();
            document.body.classList.remove('dragover');
            
            if (e.dataTransfer.files.length > 0) {
                const droppedFile = e.dataTransfer.files[0];
                printLine(`\nuser@tilwa:~$ upload ${droppedFile.name}`);
                handleFile(droppedFile);
            }
        });

        document.addEventListener('click', () => {
            if (window.getSelection().toString() === '') {
                cmdInput.focus();
            }
        });
    </script>
</body>
</html>
